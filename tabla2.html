<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabla Periódica Interactiva</title>
    <style>
        :root {
            --noble-gas: #00A3E0;
            --alkali-metal: #FF4F2E;
            --alkaline-earth: #FFC000;
            --transition-metal: #4A90E2;
            --post-transition: #78C191;
            --metalloid: #3BB143;
            --reactive-nonmetal: #614BC3;
            --halogen: #4B49AC;
            --lanthanide: #FF8F66;
            --actinide: #EE78FF;
            --unknown: #A0AEC0;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #f8fafc;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            color: #1e293b;
        }

        .container {
            max-width: 1400px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
        }

        header {
            grid-column: span 2;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 15px;
        }

        h1 { margin: 0; font-size: 2rem; font-weight: 800; color: #0f172a; }

        .btn-quiz {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-quiz:hover { background: #4338ca; transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.4); }

        /* Periodic Table Grid Layout */
        .table-section {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 20px -5px rgba(0,0,0,0.05);
            overflow-x: auto;
        }

        .periodic-grid {
            display: grid;
            grid-template-columns: repeat(18, 1fr);
            gap: 5px;
            min-width: 900px;
        }

        .element-card {
            aspect-ratio: 1/1.1;
            border-radius: 6px;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            transition: all 0.2s ease;
            border: 1px solid rgba(0,0,0,0.08);
            user-select: none;
        }

        .element-card:hover {
            transform: scale(1.25);
            z-index: 50;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.2);
            filter: brightness(1.1);
        }

        .element-card .num { position: absolute; top: 2px; left: 3px; font-size: 0.6rem; font-weight: bold; opacity: 0.8; }
        .element-card .sym { font-size: 1.2rem; font-weight: 900; }
        .element-card .name { font-size: 0.5rem; text-align: center; margin-top: 1px; white-space: nowrap; overflow: hidden; width: 90%; }

        /* Categorías */
        .noble-gas { background: var(--noble-gas); }
        .alkali-metal { background: var(--alkali-metal); }
        .alkaline-earth { background: var(--alkaline-earth); }
        .transition-metal { background: var(--transition-metal); }
        .post-transition { background: var(--post-transition); }
        .metalloid { background: var(--metalloid); }
        .reactive-nonmetal { background: var(--reactive-nonmetal); }
        .halogen { background: var(--halogen); }
        .lanthanide { background: var(--lanthanide); }
        .actinide { background: var(--actinide); }
        .unknown { background: var(--unknown); }

        /* Right Panel Detail View */
        .info-panel {
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.08);
            height: fit-content;
            position: sticky;
            top: 20px;
            border: 1px solid #e2e8f0;
        }

        .hidden { display: none !important; }

        .empty-state {
            color: #94a3b8;
            text-align: center;
            padding: 40px 10px;
            font-size: 0.9rem;
            line-height: 1.6;
            border: 2px dashed #e2e8f0;
            border-radius: 12px;
        }

        .detail-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #f1f5f9;
        }

        .mini-sym-box {
            width: 65px;
            height: 65px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 900;
            color: white;
            flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .header-text h2 { margin: 0; font-size: 1.5rem; color: #0f172a; line-height: 1.1; }
        .header-text p { margin: 5px 0 0; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: #64748b; letter-spacing: 0.8px; }

        .data-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .data-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #f8fafc;
        }

        .data-label { font-size: 0.8rem; color: #64748b; font-weight: 600; }
        .data-val { font-size: 0.95rem; font-weight: 700; color: #1e293b; }

        .conf-wrapper {
            margin-top: 8px;
            background: #f8fafc;
            padding: 10px;
            border-radius: 8px;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 0.8rem;
            word-break: break-all;
            color: #334155;
            border: 1px solid #e2e8f0;
            line-height: 1.5;
        }

        /* Quiz UI Elements */
        .quiz-opt {
            width: 100%;
            padding: 14px;
            margin-bottom: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            font-weight: 600;
            text-align: left;
            font-size: 0.95rem;
            transition: all 0.2s;
        }
        .quiz-opt:hover { border-color: #4f46e5; background: #f5f3ff; }

        .block-label {
            margin: 40px 0 10px; 
            text-align: center; 
            color: #cbd5e1; 
            font-size: 0.75rem; 
            font-weight: 900; 
            letter-spacing: 6px;
            text-transform: uppercase;
        }

        @media (max-width: 1100px) {
            .container { grid-template-columns: 1fr; }
            .info-panel { position: static; width: auto; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Tabla Periódica Interactiva</h1>
            <button id="main-quiz-btn" class="btn-quiz">Reto de Elementos</button>
        </header>

        <div class="table-section">
            <div id="grid-main" class="periodic-grid"></div>
            <div class="block-label">Bloque F: Lantánidos y Actínidos</div>
            <div id="grid-f" class="periodic-grid"></div>
        </div>

        <aside class="info-panel">
            <div id="empty-view" class="empty-state">
                <p>Selecciona un elemento de la tabla para explorar sus propiedades físicas y químicas.</p>
            </div>

            <div id="detail-view" class="hidden">
                <div class="detail-header">
                    <div id="d-box" class="mini-sym-box"></div>
                    <div class="header-text">
                        <h2 id="d-name"></h2>
                        <p id="d-cat"></p>
                    </div>
                </div>

                <div class="data-grid">
                    <div class="data-item"><span class="data-label">Nº Atómico</span><span id="d-num" class="data-val"></span></div>
                    <div class="data-item"><span class="data-label">Masa Atómica</span><span id="d-mass" class="data-val"></span></div>
                    <div class="data-item"><span class="data-label">Estado (TP)</span><span id="d-state" class="data-val"></span></div>
                    <div>
                        <span class="data-label">Configuración Electrónica:</span>
                        <div id="d-conf" class="conf-wrapper"></div>
                    </div>
                </div>
            </div>

            <div id="quiz-view" class="hidden">
                <div style="display:flex; justify-content: space-between; margin-bottom: 15px; align-items: center;">
                    <span style="font-size: 0.8rem; font-weight: 800; color: #4f46e5; letter-spacing: 1px;">MODO QUIZ</span>
                    <span id="q-progress" style="font-size: 0.8rem; font-weight: 800; color: #94a3b8;"></span>
                </div>
                <p id="q-text" style="font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; color: #1e293b;"></p>
                <div id="q-options"></div>
                <div id="q-feedback" style="margin-top: 20px; padding: 12px; border-radius: 10px; text-align: center; font-size: 0.9rem; font-weight: 700; display: none;"></div>
            </div>
        </aside>
    </div>

        document.addEventListener('DOMContentLoaded', () => {
            const gridMain = document.getElementById('grid-main');
            const gridF = document.getElementById('grid-f');
            
            elementsData.forEach(el => {
                const card = document.createElement('div');
                card.className = `element-card ${el.cat}`;
                card.style.gridColumn = el.x;
                card.style.gridRow = el.y;
                card.dataset.number = el.n;
                card.innerHTML = `<span class="num">${el.n}</span><span class="sym">${el.s}</span><span class="name">${el.name}</span>`;
                
                // Logic to place Lanthanides and Actinides in the bottom grid
                if ((el.n >= 57 && el.n <= 71) || (el.n >= 89 && el.n <= 103)) {
                    gridF.appendChild(card);
                } else {
                    gridMain.appendChild(card);
                }

                // Add placeholders in the main grid for the f-block gap
                if (el.n === 56) {
                    const place = document.createElement('div');
                    place.className = 'element-card unknown';
                    place.style.gridColumn = 3; place.style.gridRow = 6;
                    place.style.opacity = "0.5";
                    place.innerHTML = `<span class="sym" style="font-size:0.7rem">57-71</span>`;
                    gridMain.appendChild(place);
                }
                if (el.n === 88) {
                    const place = document.createElement('div');
                    place.className = 'element-card unknown';
                    place.style.gridColumn = 3; place.style.gridRow = 7;
                    place.style.opacity = "0.5";
                    place.innerHTML = `<span class="sym" style="font-size:0.7rem">89-103</span>`;
                    gridMain.appendChild(place);
                }
            });

            document.addEventListener('click', (e) => {
                const card = e.target.closest('.element-card');
                if (card && card.dataset.number) {
                    const elData = elementsData.find(item => item.n == card.dataset.number);
                    if (elData) showDetail(elData);
                }
            });

            document.getElementById('main-quiz-btn').addEventListener('click', startQuiz);
        });

        function showDetail(el) {
            document.getElementById('empty-view').classList.add('hidden');
            document.getElementById('quiz-view').classList.add('hidden');
            const view = document.getElementById('detail-view');
            view.classList.remove('hidden');

            document.getElementById('d-name').innerText = el.name;
            document.getElementById('d-cat').innerText = el.cat.replace(/-/g, ' ');
            document.getElementById('d-num').innerText = el.n;
            document.getElementById('d-mass').innerText = el.mass + ' u';
            document.getElementById('d-state').innerText = el.state;
            document.getElementById('d-conf').innerText = el.conf;
            
            const box = document.getElementById('d-box');
            box.innerText = el.s;
            box.className = `mini-sym-box ${el.cat}`;
        }

        let quizState = { current: 0, score: 0, items: [] };

        function startQuiz() {
            document.getElementById('empty-view').classList.add('hidden');
            document.getElementById('detail-view').classList.add('hidden');
            const quizView = document.getElementById('quiz-view');
            quizView.classList.remove('hidden');
            
            quizState.score = 0; quizState.current = 0;
            quizState.items = [...elementsData]
                .sort(() => Math.random() - 0.5)
                .slice(0, 5)
                .map(el => {
                    let options = [el.name];
                    while(options.length < 4) {
                        const r = elementsData[Math.floor(Math.random() * elementsData.length)].name;
                        if(!options.includes(r)) options.push(r);
                    }
                    return {
                        symbol: el.s,
                        correct: el.name,
                        options: options.sort(() => Math.random() - 0.5)
                    };
                });
            renderQuestion();
        }

        function renderQuestion() {
            const q = quizState.items[quizState.current];
            document.getElementById('q-progress').innerText = `${quizState.current + 1} / 5`;
            document.getElementById('q-text').innerText = `¿Cuál es el nombre del elemento químico "${q.symbol}"?`;
            
            const fb = document.getElementById('q-feedback');
            fb.style.display = 'none';
            
            const container = document.getElementById('q-options');
            container.innerHTML = '';
            
            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'quiz-opt';
                btn.innerText = opt;
                btn.onclick = () => {
                    fb.style.display = 'block';
                    if(opt === q.correct) {
                        quizState.score++;
                        fb.innerText = "¡Correcto! Excelente.";
                        fb.style.backgroundColor = "#dcfce7"; fb.style.color = "#15803d";
                    } else {
                        fb.innerText = `Incorrecto. Era el ${q.correct}.`;
                        fb.style.backgroundColor = "#fee2e2"; fb.style.color = "#b91c1c";
                    }
                    
                    const allBtns = container.querySelectorAll('button');
                    allBtns.forEach(b => b.disabled = true);
                    
                    setTimeout(() => {
                        quizState.current++;
                        if (quizState.current < 5) renderQuestion();
                        else showQuizResult();
                    }, 1500);
                };
                container.appendChild(btn);
            });
        }

        function showQuizResult() {
            const quizView = document.getElementById('quiz-view');
            quizView.innerHTML = `
                <div style="text-align: center; padding: 20px 0;">
                    <div style="font-size: 0.8rem; font-weight: 800; color: #64748b; margin-bottom: 10px;">RESULTADO FINAL</div>
                    <div style="font-size: 3.5rem; font-weight: 900; color: #4f46e5; line-height: 1;">${quizState.score}/5</div>
                    <p style="font-weight: 600; color: #1e293b; margin: 20px 0;">${quizState.score === 5 ? '¡Eres un experto en química!' : '¡Sigue estudiando los elementos!'}</p>
                    <button onclick="location.reload()" class="btn-quiz" style="width: 100%;">Cerrar y Volver a la Tabla</button>
                </div>
            `;
        }
    </script>
