<script>
function cerrarVentana() {
    // Intenta cerrar la pestaña (solo funciona si la web se abrió en ventana nueva)
    window.close();
    
    // Si no se cierra (porque no es ventana nueva), vuelve atrás en el historial
    setTimeout(function() {
        window.history.back();
    }, 100);
}
