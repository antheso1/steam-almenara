<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabla Periódica Completa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        .main-wrapper {
            width: 100%;
            max-width: 1300px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .periodic-table {
            display: grid;
            /* Forzamos 18 columnas iguales sin importar el contenido */
            grid-template-columns: repeat(18, minmax(0, 1fr));
            gap: 4px;
            margin-top: 20px;
        }

        .element {
            aspect-ratio: 1 / 1;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            border: 1px solid rgba(0,0,0,0.05);
            overflow: hidden; /* Evita que el texto deforme la caja */
        }

        .element:hover {
            transform: scale(1.4);
            z-index: 50;
            box-shadow: 0 12px 20px rgba(0,0,0,0.15);
            border-radius: 8px;
        }

        .symbol {
            font-size: clamp(0.7rem, 1.2vw, 1.1rem);
            font-weight: 800;
            line-height: 1;
        }

        .name {
            font-size: clamp(0.4rem, 0.6vw, 0.55rem);
            font-weight: 600;
            margin-top: 2px;
            text-align: center;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; /* Pone puntos suspensivos si el nombre es gigante */
            padding: 0 2px;
        }

        /* Colores */
        .hidrogeno { background-color: #6366f1; color: white; }
        .gas-noble { background-color: #0ea5e9; color: white; }
        .alcalino { background-color: #ef4444; color: white; }
        .alcalinoterreo { background-color: #facc15; color: #854d0e; }
        .metal-transicion { background-color: #3b82f6; color: white; }
        .metal-pobre { background-color: #4ade80; color: #064e3b; }
        .metaloide { background-color: #2dd4bf; color: white; }
        .no-metal { background-color: #818cf8; color: white; }
        .halogeno { background-color: #a78bfa; color: white; }
        .lantanido { background-color: #fb923c; color: white; }
        .actinido { background-color: #f472b6; color: white; }
        .placeholder { background-color: #fdba74; color: white; font-weight: bold; font-size: 0.6rem; }
        .placeholder-actinido { background-color: #f9a8d4; color: white; font-weight: bold; font-size: 0.6rem; }

        .f-block-title {
            grid-column: 1 / span 18;
            height: 50px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            font-size: 0.9rem;
            font-weight: 800;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* Modal */
        #modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="flex flex-col md:flex-row justify-between items-end mb-6">
        <div class="text-left">
            <h1 class="text-3xl font-black text-slate-800 tracking-tight">TABLA PERIÓDICA</h1>
            <p class="text-slate-500 font-medium">Interactiva y Completa (1-118)</p>
        </div>
        <div class="text-right text-xs text-slate-400 font-bold uppercase tracking-widest">
            Química General
        </div>
    </div>

    <div class="periodic-table" id="table"></div>
</div>

<div id="modal" onclick="closeModal()">
    <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-sm w-full mx-4 transform transition-all" onclick="event.stopPropagation()">
        <div class="flex items-center mb-6">
            <div id="m-sym" class="text-7xl font-black mr-6 text-slate-800 leading-none"></div>
            <div>
                <h2 id="m-name" class="text-3xl font-bold text-slate-800 leading-tight"></h2>
                <p class="text-slate-400 font-bold tracking-wide">NÚMERO <span id="m-num" class="text-slate-800"></span></p>
            </div>
        </div>
        <div class="space-y-4 border-t border-slate-100 pt-6">
            <div class="flex justify-between items-center">
                <span class="text-slate-500 font-bold text-sm">Categoría</span>
                <span id="m-cat" class="px-3 py-1 bg-slate-100 rounded-full text-xs font-black uppercase text-slate-600"></span>
            </div>
            <div class="bg-indigo-50 p-5 rounded-2xl">
                <h3 class="text-indigo-700 font-black text-xs uppercase mb-3 tracking-widest">Propiedades Químicas</h3>
                <ul id="m-links" class="text-sm text-indigo-900 space-y-2 opacity-80">
                    <li class="flex items-start">
                        <span class="mr-2">•</span>
                        <span>Configuración electrónica estable en condiciones normales.</span>
                    </li>
                    <li class="flex items-start">
                        <span class="mr-2">•</span>
                        <span>Capacidad de formación de enlaces covalentes y iónicos.</span>
                    </li>
                </ul>
            </div>
        </div>
        <button onclick="closeModal()" class="mt-8 w-full py-4 bg-slate-900 hover:bg-black text-white rounded-2xl font-bold transition-all shadow-lg">Cerrar Detalle</button>
    </div>
</div>

const container = document.getElementById('table');

function init() {
    const spacer = document.createElement('div');
    spacer.className = 'f-block-title';
    spacer.style.gridRow = "8";
    spacer.innerText = "BLOQUE F (LANTÁNIDOS Y ACTÍNIDOS)";
    container.appendChild(spacer);

    elements.forEach(el => {
        const div = document.createElement('div');
        div.className = `element ${el.cat}`;
        div.style.gridColumn = el.x;
        div.style.gridRow = el.y;
        div.innerHTML = `
            <div class="symbol">${el.s}</div>
            <div class="name">${el.name}</div>
        `;
        div.onclick = () => showModal(el);
        container.appendChild(div);
    });
}

function showModal(el) {
    if (typeof el.n === 'string') return;
    document.getElementById('m-sym').innerText = el.s;
    document.getElementById('m-name').innerText = el.name;
    document.getElementById('m-num').innerText = el.n;
    document.getElementById('m-cat').innerText = el.cat.replace('-', ' ');
    document.getElementById('modal').style.display = 'flex';
}

function closeModal() {
    document.getElementById('modal').style.display = 'none';
}
