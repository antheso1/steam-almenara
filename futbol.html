<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Máster del Fútbol - Trivia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0d6e38; /* Fondo verde futbolero */
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            width: 100%;
            max-width: 500px;
            padding: 40px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .btn-green {
            background-color: #10a34d;
            color: white;
            font-weight: 800;
            padding: 16px 32px;
            border-radius: 16px;
            font-size: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            transition: transform 0.2s, background-color 0.2s;
            cursor: pointer;
            border: none;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .btn-green:hover {
            background-color: #0e8c42;
            transform: translateY(-2px);
        }

        .btn-green:active {
            transform: translateY(0);
        }

        .option-btn {
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 14px;
            width: 100%;
            text-align: left;
            margin-bottom: 12px;
            transition: all 0.2s;
            font-weight: 500;
            background: white;
        }

        .option-btn:hover {
            border-color: #10a34d;
            background-color: #f0fdf4;
        }

        .option-btn.selected {
            border-color: #10a34d;
            background-color: #10a34d;
            color: white;
        }

        .trophy-container {
            background-color: #fff9db;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px auto;
        }

        .progress-bar {
            height: 8px;
            background-color: #e2e8f0;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 24px;
        }

        .progress-fill {
            height: 100%;
            background-color: #10a34d;
            transition: width 0.3s ease;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="card" id="game-card">
        <!-- Pantalla de Inicio -->
        <div id="screen-start">
            <div class="trophy-container">
                <svg width="60" height="60" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M6 9V2H18V9C18 12.31 15.31 15 12 15C8.69 15 6 12.31 6 9Z" stroke="#d4af37" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M6 4H2V8C2 9.1 2.9 10 4 10H6V4Z" stroke="#d4af37" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M18 4H22V8C22 9.1 21.1 10 20 10H18V4Z" stroke="#d4af37" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M12 15V22" stroke="#d4af37" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M8 22H16" stroke="#d4af37" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            
            <h1 class="text-4xl font-black text-gray-900 mb-4 tracking-tight">MÁSTER DEL FÚTBOL</h1>
            <p class="text-gray-500 text-lg mb-10 leading-relaxed">
                ¿Cuánto sabes realmente? Responde 5 preguntas aleatorias de un total de 100.
            </p>

            <button class="btn-green" onclick="startGame()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M8 5V19L19 12L8 5Z" />
                </svg>
                JUGAR AHORA
            </button>

            <div class="flex justify-center gap-6 mt-8 text-gray-400 text-sm">
                <span class="flex items-center gap-1">⭐ +100 Preguntas</span>
                <span class="flex items-center gap-1">🔄 Siempre diferente</span>
            </div>
        </div>

        <!-- Pantalla de Preguntas -->
        <div id="screen-quiz" class="hidden">
            <div class="flex justify-between items-center mb-2">
                <span id="question-count" class="text-sm font-bold text-gray-400">PREGUNTA 1 DE 5</span>
                <span id="score-tracking" class="text-sm font-bold text-green-600">Puntos: 0</span>
            </div>
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill" style="width: 20%;"></div>
            </div>
            
            <h2 id="question-text" class="text-2xl font-bold text-gray-800 mb-8 text-left">Cargando pregunta...</h2>
            
            <div id="options-container">
                <!-- Las opciones se generarán aquí -->
            </div>
        </div>

        <!-- Pantalla de Resultados -->
        <div id="screen-result" class="hidden text-center">
            <div class="trophy-container" id="result-icon-bg">
                <svg id="result-icon" width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#d4af37" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M8 14s1.5 2 4 2 4-2 4-2"></path>
                    <line x1="9" y1="9" x2="9.01" y2="9"></line>
                    <line x1="15" y1="9" x2="15.01" y2="9"></line>
                </svg>
            </div>
            <h2 class="text-3xl font-black text-gray-900 mb-2" id="result-title">¡Buen intento!</h2>
            <p class="text-gray-500 mb-8" id="result-text">Has acertado 3 de 5 preguntas.</p>
            
            <div class="bg-gray-50 p-6 rounded-2xl mb-8">
                <span class="text-sm text-gray-400 block mb-1">PUNTUACIÓN FINAL</span>
                <span class="text-5xl font-black text-green-600" id="final-score">60%</span>
            </div>

            <button class="btn-green" onclick="restartGame()">
                VOLVER A JUGAR
            </button>
        </div>
    </div>

    <script>
        const questionsBank = [
            { q: "¿Qué selección ha ganado más Mundiales?", options: ["Alemania", "Italia", "Brasil", "Argentina"], correct: 2 },
            { q: "¿Quién es el máximo goleador histórico de la Champions?", options: ["Messi", "Cristiano Ronaldo", "Lewandowski", "Benzema"], correct: 1 },
            { q: "¿En qué club jugó Maradona tras el Barcelona?", options: ["Sevilla", "Napoli", "Boca Juniors", "PSG"], correct: 1 },
            { q: "¿Dónde fue el primer Mundial (1930)?", options: ["Brasil", "Uruguay", "Francia", "Italia"], correct: 1 },
            { q: "¿Qué jugador tiene 3 Copas del Mundo?", options: ["Pelé", "Maradona", "Zidane", "Ronaldo Nazário"], correct: 0 },
            { q: "¿Qué equipo tiene más Champions League?", options: ["Milan", "Bayern Múnich", "Real Madrid", "Liverpool"], correct: 2 },
            { q: "¿Quién ganó el Balón de Oro 2023?", options: ["Mbappé", "Haaland", "Lionel Messi", "Rodri"], correct: 2 },
            { q: "¿Cómo se llama el estadio del Real Madrid?", options: ["Camp Nou", "Metropolitano", "Santiago Bernabéu", "San Siro"], correct: 2 },
            { q: "¿Cuál es el apodo de la selección argentina?", options: ["La Roja", "La Albiceleste", "La Canarinha", "La Tricolor"], correct: 1 },
            { q: "¿Cuántos jugadores hay por equipo en el campo?", options: ["10", "12", "11", "9"], correct: 2 },
            { q: "¿Quién anotó el 'Gol del Siglo'?", options: ["Pelé", "Maradona", "Cruyff", "Eusebio"], correct: 1 },
            { q: "¿Qué país ganó la Eurocopa 2024?", options: ["Inglaterra", "Francia", "España", "Alemania"], correct: 2 }
        ];

        let currentQuestions = [];
        let currentQuestionIndex = 0;
        let score = 0;

        function startGame() {
            // Seleccionar 5 preguntas al azar
            currentQuestions = [...questionsBank].sort(() => 0.5 - Math.random()).slice(0, 5);
            currentQuestionIndex = 0;
            score = 0;
            
            showScreen('screen-quiz');
            loadQuestion();
        }

        function loadQuestion() {
            const question = currentQuestions[currentQuestionIndex];
            document.getElementById('question-count').innerText = `PREGUNTA ${currentQuestionIndex + 1} DE 5`;
            document.getElementById('question-text').innerText = question.q;
            document.getElementById('score-tracking').innerText = `Puntos: ${score}`;
            document.getElementById('progress-fill').style.width = `${((currentQuestionIndex + 1) / 5) * 100}%`;
            
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            question.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => handleAnswer(index);
                optionsContainer.appendChild(btn);
            });
        }

        function handleAnswer(selectedIndex) {
            const correctIndex = currentQuestions[currentQuestionIndex].correct;
            
            if (selectedIndex === correctIndex) {
                score++;
            }

            currentQuestionIndex++;
            
            if (currentQuestionIndex < 5) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            showScreen('screen-result');
            const percent = (score / 5) * 100;
            document.getElementById('final-score').innerText = `${percent}%`;
            document.getElementById('result-text').innerText = `Has acertado ${score} de 5 preguntas.`;
            
            const title = document.getElementById('result-title');
            if (score === 5) title.innerText = "¡MÁSTER ABSOLUTO!";
            else if (score >= 3) title.innerText = "¡Muy bien!";
            else title.innerText = "Sigue practicando...";
        }

        function restartGame() {
            showScreen('screen-start');
        }

        function showScreen(screenId) {
            document.getElementById('screen-start').classList.add('hidden');
            document.getElementById('screen-quiz').classList.add('hidden');
            document.getElementById('screen-result').classList.add('hidden');
            document.getElementById(screenId).classList.remove('hidden');
        }
    </script>
</body>
</html>
