<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hardware Match: Une los Conceptos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white;
        }

        .card-item {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card-item:hover:not(.matched):not(.disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            border-color: #60a5fa;
        }

        .selected {
            background-color: #3b82f6 !important; /* Blue-500 */
            border-color: #93c5fd !important;
            color: white;
            transform: scale(1.02);
        }

        .matched {
            background-color: #10b981 !important; /* Emerald-500 */
            border-color: #34d399 !important;
            opacity: 0.7;
            pointer-events: none;
            transform: scale(0.98);
        }

        .wrong {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
            background-color: #ef4444 !important; /* Red-500 */
            border-color: #fca5a5 !important;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b; 
        }
        ::-webkit-scrollbar-thumb {
            background: #475569; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #64748b; 
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background-color: #f00;
            animation: fall linear forwards;
            z-index: 100;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Header -->
    <header class="text-center mb-8 w-full max-w-4xl">
        <h1 class="text-4xl md:text-5xl font-bold mb-2 text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">
            Master del Hardware
        </h1>
        <p class="text-slate-400 text-lg">Selecciona un concepto y busca su definición correcta.</p>
        
        <div class="flex justify-between items-center mt-6 bg-slate-800 p-4 rounded-xl shadow-lg border border-slate-700">
            <div class="flex items-center gap-2">
                <i class="fas fa-stopwatch text-cyan-400 text-xl"></i>
                <span id="timer" class="text-2xl font-mono">00:00</span>
            </div>
            <div class="flex items-center gap-2">
                <span class="text-slate-400">Aciertos:</span>
                <span id="score" class="text-2xl font-bold text-emerald-400">0/6</span>
            </div>
            <button onclick="restartGame()" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg transition-colors text-sm font-semibold">
                <i class="fas fa-redo mr-2"></i>Reiniciar
            </button>
        </div>
    </header>

    <!-- Game Board -->
    <main class="w-full max-w-6xl grid grid-cols-1 md:grid-cols-2 gap-8 relative">
        
        <!-- Concepts Column -->
        <div class="flex flex-col gap-4">
            <h2 class="text-xl font-semibold text-cyan-300 mb-2 flex items-center gap-2">
                <i class="fas fa-microchip"></i> Conceptos
            </h2>
            <div id="concepts-container" class="flex flex-col gap-3">
                <!-- Generated by JS -->
            </div>
        </div>

        <!-- Definitions Column -->
        <div class="flex flex-col gap-4">
            <h2 class="text-xl font-semibold text-cyan-300 mb-2 flex items-center gap-2">
                <i class="fas fa-book-open"></i> Definiciones
            </h2>
            <div id="definitions-container" class="flex flex-col gap-3">
                <!-- Generated by JS -->
            </div>
        </div>

    </main>

    <!-- Win Modal -->
    <div id="win-modal" class="fixed inset-0 bg-black/80 flex items-center justify-center hidden z-50 backdrop-blur-sm">
        <div class="bg-slate-800 p-8 rounded-2xl border border-cyan-500/30 shadow-2xl max-w-md w-full text-center transform transition-all scale-100">
            <div class="w-20 h-20 bg-emerald-500/20 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-trophy text-4xl text-emerald-400"></i>
            </div>
            <h2 class="text-3xl font-bold text-white mb-2">¡Completado!</h2>
            <p class="text-slate-300 mb-6">Eres un experto en hardware.</p>
            
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="bg-slate-900 p-3 rounded-lg">
                    <p class="text-xs text-slate-500 uppercase">Tiempo</p>
                    <p id="final-time" class="text-xl font-mono text-cyan-400">00:00</p>
                </div>
                <div class="bg-slate-900 p-3 rounded-lg">
                    <p class="text-xs text-slate-500 uppercase">Errores</p>
                    <p id="final-mistakes" class="text-xl font-mono text-red-400">0</p>
                </div>
            </div>

            <button onclick="restartGame()" class="w-full py-3 bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 rounded-xl font-bold shadow-lg shadow-cyan-500/20 transition-all transform hover:scale-[1.02]">
                Jugar de nuevo
            </button>
        </div>
    </div>

    <script>
        // Game Data
        const gameData = [
            {
                id: 1,
                term: "Placa Base",
                def: "Tarjeta de circuito principal que conecta todos los componentes del ordenador (CPU, RAM, discos).",
                icon: "fa-chess-board"
            },
            {
                id: 2,
                term: "Microprocesador (CPU)",
                def: "El 'cerebro' del equipo. Ejecuta las instrucciones y procesa los datos de los programas.",
                icon: "fa-microchip"
            },
            {
                id: 3,
                term: "Memoria RAM",
                def: "Almacenamiento temporal y muy rápido. Guarda los datos que se están usando en ese momento.",
                icon: "fa-memory"
            },
            {
                id: 4,
                term: "Disco Duro / SSD",
                def: "Dispositivo de almacenamiento permanente donde se guardan el sistema operativo y tus archivos.",
                icon: "fa-hdd"
            },
            {
                id: 5,
                term: "Tarjeta Gráfica (GPU)",
                def: "Componente encargado de procesar y generar las imágenes y vídeo que ves en el monitor.",
                icon: "fa-desktop"
            },
            {
                id: 6,
                term: "Fuente de Alimentación",
                def: "Convierte la corriente alterna de la pared en corriente continua para dar energía al PC.",
                icon: "fa-plug"
            }
        ];

        // State Variables
        let selectedTerm = null;
        let selectedDef = null;
        let matchedPairs = 0;
        let mistakes = 0;
        let isLock = false; // Prevent clicks during animation
        let timerInterval;
        let seconds = 0;
        let gameActive = false;

        // DOM Elements
        const conceptsContainer = document.getElementById('concepts-container');
        const definitionsContainer = document.getElementById('definitions-container');
        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const winModal = document.getElementById('win-modal');
        const finalTimeEl = document.getElementById('final-time');
        const finalMistakesEl = document.getElementById('final-mistakes');

        // Helper: Shuffle Array
        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        // Helper: Create Confetti
        function createConfetti() {
            for(let i=0; i<50; i++) {
                const conf = document.createElement('div');
                conf.classList.add('confetti');
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.animationDuration = (Math.random() * 2 + 2) + 's';
                conf.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 50%)`;
                document.body.appendChild(conf);
                setTimeout(() => conf.remove(), 4000);
            }
        }

        // Initialize Game
        function initGame() {
            // Reset State
            selectedTerm = null;
            selectedDef = null;
            matchedPairs = 0;
            mistakes = 0;
            isLock = false;
            seconds = 0;
            gameActive = true;
            
            clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 1000);
            timerEl.innerText = "00:00";
            scoreEl.innerText = `0/${gameData.length}`;
            winModal.classList.add('hidden');

            // Clear Containers
            conceptsContainer.innerHTML = '';
            definitionsContainer.innerHTML = '';

            // Create Data Copies & Shuffle
            const terms = shuffle([...gameData]);
            const definitions = shuffle([...gameData]);

            // Render Terms
            terms.forEach(item => {
                const el = document.createElement('div');
                el.className = 'card-item bg-slate-800 border-2 border-slate-700 p-4 rounded-xl cursor-pointer hover:bg-slate-750 flex items-center gap-4';
                el.dataset.id = item.id;
                el.dataset.type = 'term';
                el.innerHTML = `
                    <div class="w-10 h-10 bg-blue-500/20 rounded-full flex items-center justify-center text-blue-400">
                        <i class="fas ${item.icon}"></i>
                    </div>
                    <span class="font-semibold text-lg">${item.term}</span>
                `;
                el.addEventListener('click', () => handleCardClick(el, 'term', item.id));
                conceptsContainer.appendChild(el);
            });

            // Render Definitions
            definitions.forEach(item => {
                const el = document.createElement('div');
                el.className = 'card-item bg-slate-800 border-2 border-slate-700 p-4 rounded-xl cursor-pointer hover:bg-slate-750 flex items-center text-sm md:text-base';
                el.dataset.id = item.id;
                el.dataset.type = 'def';
                el.innerHTML = `<span class="text-slate-300 leading-relaxed">${item.def}</span>`;
                el.addEventListener('click', () => handleCardClick(el, 'def', item.id));
                definitionsContainer.appendChild(el);
            });
        }

        function updateTimer() {
            seconds++;
            const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
            const secs = (seconds % 60).toString().padStart(2, '0');
            timerEl.innerText = `${mins}:${secs}`;
        }

        function handleCardClick(element, type, id) {
            if (isLock || !gameActive || element.classList.contains('matched')) return;
            
            // Deselect logic if clicking the same card
            if (element.classList.contains('selected')) {
                element.classList.remove('selected');
                if (type === 'term') selectedTerm = null;
                else selectedDef = null;
                return;
            }

            // Select logic
            // 1. Clear previous selection of SAME type
            if (type === 'term') {
                if (selectedTerm) selectedTerm.el.classList.remove('selected');
                selectedTerm = { id, el: element };
            } else {
                if (selectedDef) selectedDef.el.classList.remove('selected');
                selectedDef = { id, el: element };
            }

            element.classList.add('selected');

            // 2. Check for match if both types are selected
            if (selectedTerm && selectedDef) {
                checkMatch();
            }
        }

        function checkMatch() {
            isLock = true;
            const termId = selectedTerm.id;
            const defId = selectedDef.id;

            if (termId === defId) {
                // Success
                selectedTerm.el.classList.remove('selected');
                selectedDef.el.classList.remove('selected');
                
                selectedTerm.el.classList.add('matched');
                selectedDef.el.classList.add('matched');
                
                // Add success icon to definition
                const checkIcon = document.createElement('i');
                checkIcon.className = 'fas fa-check-circle text-emerald-500 ml-auto text-xl animate-bounce';
                selectedDef.el.appendChild(checkIcon);

                matchedPairs++;
                scoreEl.innerText = `${matchedPairs}/${gameData.length}`;
                
                selectedTerm = null;
                selectedDef = null;
                isLock = false;

                if (matchedPairs === gameData.length) {
                    endGame();
                }
            } else {
                // Failure
                mistakes++;
                selectedTerm.el.classList.add('wrong');
                selectedDef.el.classList.add('wrong');

                setTimeout(() => {
                    selectedTerm.el.classList.remove('selected', 'wrong');
                    selectedDef.el.classList.remove('selected', 'wrong');
                    selectedTerm = null;
                    selectedDef = null;
                    isLock = false;
                }, 800);
            }
        }

        function endGame() {
            gameActive = false;
            clearInterval(timerInterval);
            createConfetti();
            
            setTimeout(() => {
                finalTimeEl.innerText = timerEl.innerText;
                finalMistakesEl.innerText = mistakes;
                winModal.classList.remove('hidden');
            }, 500);
        }

        function restartGame() {
            initGame();
        }

        // Start on load
        window.onload = initGame;

    </script>
</body>
</html>
