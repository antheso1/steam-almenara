<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora TAE Pro</title>
    
    <!-- Tailwind CSS para el diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 1. React y ReactDOM (Versiones fijas y estables) -->
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    
    <!-- 2. Prop-types (Necesario para Recharts UMD) -->
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    
    <!-- 3. Recharts (Versión compatible con React 18 UMD) -->
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.min.js"></script>
    
    <!-- 4. Babel para traducir el código React -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Configuración de Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        indigo: { 900: '#312e81', 400: '#818cf8' },
                        slate: { 900: '#0f172a', 800: '#1e293b' }
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        /* Animación suave para las tarjetas */
        .card-hover:hover { transform: translateY(-4px); }
        /* Estilos para sliders */
        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 16px; width: 16px;
            border-radius: 50%; background: #ec4899; cursor: pointer; margin-top: -6px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 4px; cursor: pointer; background: #334155; border-radius: 2px;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-slate-800 to-indigo-900 min-h-screen text-slate-100">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        // Accedemos a Recharts de manera segura
        const { PieChart, Pie, Cell, ResponsiveContainer, Tooltip } = window.Recharts || {};

        // --- Iconos SVG (Inline para evitar dependencias externas complejas) ---
        const IconCalculator = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></svg>;
        const IconWallet = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 7V4a1 1 0 0 0-1-1H5a2 2 0 0 0 0 4h15a1 1 0 0 1 1 1v4h-3a2 2 0 0 0 0 4h3a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1"/><path d="M3 5v14a2 2 0 0 0 2 2h15a1 1 0 0 0 1-1v-4"/></svg>;
        const IconEuro = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 10h12"/><path d="M4 14h9"/><path d="M19 6a7.7 7.7 0 0 0-5.2-2A7.9 7.9 0 0 0 6 12c0 4.4 3.5 8 7.8 8 2 0 3.8-.8 5.2-2"/></svg>;
        const IconPercent = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" x2="5" y1="5" y2="19"/><circle cx="6.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></svg>;
        const IconCalendar = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>;
        const IconInfo = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>;

        function App() {
            // --- Estados (Inputs) ---
            const [capital, setCapital] = useState(10000);
            const [tin, setTin] = useState(5.5);
            const [plazo, setPlazo] = useState(2);
            const [comision, setComision] = useState(0);

            // --- Estados (Resultados) ---
            const [resultados, setResultados] = useState({
                cuotaMensual: 0,
                totalIntereses: 0,
                totalPagar: 0,
                taeReal: 0
            });

            // --- Cálculos ---
            useEffect(() => {
                calcularPrestamo();
            }, [capital, tin, plazo, comision]);

            const calcularPrestamo = () => {
                const meses = plazo * 12;
                const interesMensual = tin / 100 / 12;
                
                let cuota = 0;
                if (interesMensual > 0) {
                    cuota = (capital * interesMensual) / (1 - Math.pow(1 + interesMensual, -meses));
                } else {
                    cuota = capital / meses;
                }

                const totalPagarBruto = cuota * meses;
                const totalIntereses = totalPagarBruto - capital;
                
                // Cálculo TAE (Newton-Raphson simplificado)
                const capitalRealRecibido = capital - comision;
                const taeCalculado = calcularTAEIretativo(capitalRealRecibido, cuota, meses);

                setResultados({
                    cuotaMensual: cuota,
                    totalIntereses: totalIntereses + comision,
                    totalPagar: totalPagarBruto + comision,
                    taeReal: taeCalculado
                });
            };

            const calcularTAEIretativo = (inversion, flujo, nPeriodos) => {
                if (inversion <= 0 || flujo <= 0) return 0;
                let guess = 0.1 / 12;
                const epsilon = 0.00001;
                const maxIter = 100;

                for (let i = 0; i < maxIter; i++) {
                    let fValue = (flujo * (1 - Math.pow(1 + guess, -nPeriodos))) / guess - inversion;
                    let fDerivative = (flujo * (Math.pow(1 + guess, -nPeriodos - 1) * nPeriodos * guess - (1 - Math.pow(1 + guess, -nPeriodos)))) / (guess * guess);
                    let newGuess = guess - fValue / fDerivative;
                    if (Math.abs(newGuess - guess) < epsilon) { guess = newGuess; break; }
                    guess = newGuess;
                }
                const tae = (Math.pow(1 + guess, 12) - 1) * 100;
                return isNaN(tae) || !isFinite(tae) ? 0 : tae;
            };

            // --- Formateadores ---
            const formatoEuro = new Intl.NumberFormat('es-ES', { style: 'currency', currency: 'EUR' });
            const formatoPorcentaje = new Intl.NumberFormat('es-ES', { style: 'percent', minimumFractionDigits: 2, maximumFractionDigits: 2 });

            const datosGrafico = [
                { name: 'Capital', value: capital, color: '#6366f1' }, // Indigo
                { name: 'Intereses y Gastos', value: resultados.totalIntereses, color: '#ec4899' }, // Pink
            ];

            // Si Recharts no cargó (por error de red), mostramos aviso simple, sino el gráfico
            const renderGrafico = () => {
                if (!window.Recharts) return <div className="flex items-center justify-center h-full text-slate-500">Gráfico no disponible</div>;
                
                return (
                    <ResponsiveContainer width="100%" height="100%">
                        <PieChart>
                            <Pie data={datosGrafico} cx="50%" cy="50%" innerRadius={60} outerRadius={80} paddingAngle={5} dataKey="value" stroke="none">
                                {datosGrafico.map((entry, index) => (
                                    <Cell key={`cell-${index}`} fill={entry.color} />
                                ))}
                            </Pie>
                            <Tooltip formatter={(value) => formatoEuro.format(value)} contentStyle={{ backgroundColor: '#1e293b', borderColor: '#334155', color: '#fff', borderRadius: '12px' }} itemStyle={{ color: '#fff' }} />
                        </PieChart>
                    </ResponsiveContainer>
                );
            };

            return (
                <div className="py-10 px-4 sm:px-6 lg:px-8">
                    <div className="max-w-5xl mx-auto">
                        
                        {/* Header */}
                        <div className="text-center mb-10 space-y-2">
                            <div className="flex justify-center mb-4">
                                <div className="p-4 bg-white/10 rounded-2xl backdrop-blur-sm shadow-xl border border-white/10 text-pink-400">
                                    <IconCalculator />
                                </div>
                            </div>
                            <h1 className="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-300 to-pink-300">
                                Calculadora TAE Pro
                            </h1>
                            <p className="text-slate-400 text-lg">Descubre el coste real de tu préstamo</p>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                            
                            {/* Panel Izquierdo: Inputs */}
                            <div className="lg:col-span-5 space-y-6">
                                <div className="bg-white/5 backdrop-blur-md rounded-3xl p-6 border border-white/10 shadow-2xl">
                                    <h2 className="text-xl font-semibold mb-6 flex items-center gap-2 text-indigo-300">
                                        <div className="w-5 h-5"><IconWallet /></div>
                                        Datos del Préstamo
                                    </h2>

                                    {/* Input Capital */}
                                    <div className="mb-6">
                                        <label className="block text-sm font-medium text-slate-400 mb-2">Importe Solicitado</label>
                                        <div className="relative">
                                            <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-indigo-400">
                                                <IconEuro />
                                            </div>
                                            <input type="number" min="0" value={capital} onChange={(e) => setCapital(Number(e.target.value))}
                                                className="block w-full pl-12 pr-4 py-3 bg-slate-900/50 border border-slate-700 rounded-xl focus:ring-2 focus:ring-pink-500 outline-none text-white text-lg font-semibold transition-all" />
                                        </div>
                                    </div>

                                    {/* Input TIN */}
                                    <div className="mb-6">
                                        <label className="block text-sm font-medium text-slate-400 mb-2 flex justify-between">
                                            <span>Interés Nominal (TIN)</span>
                                            <span className="text-xs bg-indigo-500/20 text-indigo-300 px-2 py-0.5 rounded-full">Anual</span>
                                        </label>
                                        <div className="relative">
                                            <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-indigo-400">
                                                <IconPercent />
                                            </div>
                                            <input type="number" min="0" step="0.1" value={tin} onChange={(e) => setTin(Number(e.target.value))}
                                                className="block w-full pl-12 pr-4 py-3 bg-slate-900/50 border border-slate-700 rounded-xl focus:ring-2 focus:ring-pink-500 outline-none text-white text-lg font-semibold" />
                                        </div>
                                    </div>

                                    {/* Input Plazo */}
                                    <div className="mb-6">
                                        <label className="block text-sm font-medium text-slate-400 mb-2">Plazo</label>
                                        <div className="relative flex items-center">
                                            <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-indigo-400">
                                                <IconCalendar />
                                            </div>
                                            <input type="number" min="1" max="40" value={plazo} onChange={(e) => setPlazo(Number(e.target.value))}
                                                className="block w-full pl-12 pr-20 py-3 bg-slate-900/50 border border-slate-700 rounded-xl focus:ring-2 focus:ring-pink-500 outline-none text-white text-lg font-semibold" />
                                            <div className="absolute inset-y-0 right-0 flex items-center pr-4 pointer-events-none text-slate-500">Años</div>
                                        </div>
                                        <input type="range" min="1" max="30" value={plazo} onChange={(e) => setPlazo(Number(e.target.value))}
                                            className="w-full mt-3" />
                                    </div>

                                    {/* Input Comisión */}
                                    <div className="mb-2 pt-4 border-t border-slate-700/50">
                                        <label className="block text-sm font-medium text-slate-400 mb-2 flex items-center gap-2">
                                            Gastos Iniciales / Comisión
                                            <div className="group relative">
                                                <div className="w-4 h-4 text-slate-500 cursor-help"><IconInfo /></div>
                                                <span className="absolute bottom-full left-1/2 transform -translate-x-1/2 mb-2 hidden group-hover:block w-48 bg-black text-xs text-white p-2 rounded shadow-lg z-10">Gastos de apertura, notaría, etc.</span>
                                            </div>
                                        </label>
                                        <div className="relative">
                                            <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-emerald-400">
                                                <IconEuro />
                                            </div>
                                            <input type="number" min="0" value={comision} onChange={(e) => setComision(Number(e.target.value))}
                                                className="block w-full pl-12 pr-4 py-3 bg-slate-900/50 border border-emerald-900/30 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none text-emerald-100 text-lg font-semibold" />
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Panel Derecho: Resultados */}
                            <div className="lg:col-span-7 space-y-6">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {/* Card Cuota */}
                                    <div className="card-hover bg-gradient-to-br from-pink-600 to-purple-700 rounded-3xl p-6 text-white shadow-2xl transition-transform duration-300">
                                        <p className="text-pink-100 text-sm font-medium mb-1">Cuota Mensual</p>
                                        <div className="text-4xl font-bold tracking-tight">{formatoEuro.format(resultados.cuotaMensual)}</div>
                                        <p className="text-xs text-pink-200 mt-2 opacity-80">Durante {plazo * 12} meses</p>
                                    </div>

                                    {/* Card TAE */}
                                    <div className="bg-white/5 backdrop-blur-md border border-white/10 rounded-3xl p-6 shadow-xl relative overflow-hidden">
                                        <p className="text-slate-400 text-sm font-medium mb-1">TAE Real</p>
                                        <div className={`text-4xl font-bold tracking-tight ${resultados.taeReal > tin ? 'text-amber-400' : 'text-indigo-400'}`}>
                                            {formatoPorcentaje.format(resultados.taeReal / 100)}
                                        </div>
                                        <p className="text-xs mt-2 text-slate-500">
                                            {comision > 0 ? "Superior al TIN por gastos" : "Igual al TIN (sin gastos)"}
                                        </p>
                                    </div>
                                </div>

                                {/* Resumen y Gráfico */}
                                <div className="bg-white/5 backdrop-blur-md border border-white/10 rounded-3xl p-6 shadow-xl grid grid-cols-1 md:grid-cols-2 gap-6 items-center">
                                    <div className="space-y-4">
                                        <h3 className="text-lg font-semibold text-white mb-4">Resumen</h3>
                                        
                                        <div className="flex justify-between p-3 rounded-xl bg-slate-800/50 border border-slate-700/50">
                                            <div className="flex items-center gap-2 text-slate-300 text-sm">
                                                <div className="w-3 h-3 rounded-full bg-indigo-500"></div> Capital
                                            </div>
                                            <span className="font-bold text-white">{formatoEuro.format(capital)}</span>
                                        </div>

                                        <div className="flex justify-between p-3 rounded-xl bg-slate-800/50 border border-slate-700/50">
                                            <div className="flex items-center gap-2 text-slate-300 text-sm">
                                                <div className="w-3 h-3 rounded-full bg-pink-500"></div> Intereses
                                            </div>
                                            <span className="font-bold text-pink-300">{formatoEuro.format(resultados.totalIntereses - comision)}</span>
                                        </div>

                                        {comision > 0 && (
                                            <div className="flex justify-between p-3 rounded-xl bg-slate-800/50 border border-slate-700/50">
                                                <div className="flex items-center gap-2 text-slate-300 text-sm">
                                                    <div className="w-3 h-3 rounded-full bg-emerald-500"></div> Gastos
                                                </div>
                                                <span className="font-bold text-emerald-300">{formatoEuro.format(comision)}</span>
                                            </div>
                                        )}

                                        <div className="pt-4 border-t border-white/10 flex justify-between items-end">
                                            <span className="text-slate-400 text-sm">Total a pagar</span>
                                            <span className="text-2xl font-bold text-white">{formatoEuro.format(resultados.totalPagar)}</span>
                                        </div>
                                    </div>

                                    {/* Gráfico */}
                                    <div className="h-64 w-full relative">
                                        {renderGrafico()}
                                        <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                                            <span className="text-xs text-slate-400">Coste Total</span>
                                            <span className="text-lg font-bold text-pink-400">
                                                {((resultados.totalIntereses / resultados.totalPagar) * 100).toFixed(1)}%
                                            </span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
