<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Presupuesto con Salida</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f0f5f9; margin: 0; }
        
        /* Botón X flotante */
        .btn-cerrar {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 9999;
            background: #1e293b;
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: 2px solid white;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <button onclick="salir()" class="btn-cerrar">✕</button>

    <div class="hero-banner bg-slate-800 text-white p-10 text-center border-b-4 border-yellow-400">
        <h1 class="text-2xl font-black uppercase">Presupuesto Familiar</h1>
        <p class="text-[10px] opacity-70">Usa la X para volver si te pierdes</p>
    </div>

    <div class="p-4 max-w-4xl mx-auto">
        <div class="bg-white p-6 rounded-xl shadow-md border border-slate-200">
            <h2 class="font-bold mb-4">Panel de Control</h2>
            <div class="grid gap-4">
                <button onclick="newCase()" class="w-full py-3 bg-indigo-600 text-white rounded-lg font-bold">NUEVO CASO</button>
                <button onclick="validate()" class="w-full py-3 bg-blue-600 text-white rounded-lg font-bold">CORREGIR</button>
            </div>
        </div>
    </div>

    <script>
        // Esta función intenta todas las formas de "salir" en iPhone
        function salir() {
            // 1. Intenta cerrar la pestaña actual
            window.close();
            
            // 2. Si sigue ahí, intenta volver atrás en el historial
            window.history.back();
            
            // 3. Si estás en Google Sites, esto ayuda a refrescar
            console.log("Intentando salir...");
        }

        // Simulación de funciones para que no de error
        function newCase() { alert("Nuevo caso generado"); }
        function validate() { alert("Presupuesto corregido"); }
    </script>
</body>
</html>
