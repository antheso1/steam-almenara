<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Runner de Seguridad: Aula Taller</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto:wght@400;700&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            background-color: #2c3e50;
            font-family: 'Roboto', sans-serif;
            touch-action: none; /* Prevenir zoom en móviles */
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            background: linear-gradient(to bottom, #203a43, #2c5364);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            max-width: 100%;
            max-height: 100%;
        }

        /* UI Overlay Elements */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .hud {
            padding: 20px;
            color: white;
            display: flex;
            justify-content: space-between;
            font-family: 'Press Start 2P', cursive;
            font-size: 14px;
            text-shadow: 2px 2px 0 #000;
        }

        .question-box {
            background-color: rgba(255, 193, 7, 0.95);
            color: #333;
            padding: 15px 20px;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            margin: 10px auto;
            max-width: 80%;
            border: 4px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transform: translateY(-150%);
            transition: transform 0.3s ease-out;
        }

        .question-box.active {
            transform: translateY(0);
        }

        /* Screens (Start/Game Over) */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            z-index: 10;
            color: white;
            text-align: center;
        }

        .hidden {
            display: none !important;
        }

        h1 {
            font-family: 'Press Start 2P', cursive;
            color: #ffc107;
            margin-bottom: 20px;
            font-size: 2rem;
            line-height: 1.5;
            padding: 0 20px;
        }

        p {
            font-size: 1.1rem;
            max-width: 600px;
            margin-bottom: 30px;
            line-height: 1.6;
            padding: 0 20px;
        }

        button {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-family: 'Press Start 2P', cursive;
            cursor: pointer;
            border-radius: 5px;
            box-shadow: 0 6px 0 #c0392b;
            transition: transform 0.1s;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #c0392b;
        }

        .controls-hint {
            margin-top: 30px;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        /* Mobile controls */
        #mobile-controls {
            position: absolute;
            bottom: 20px;
            width: 100%;
            height: 100px;
            display: none; /* Shown via JS on touch devices */
            pointer-events: none;
        }
        
        .touch-zone {
            width: 50%;
            height: 100%;
            position: absolute;
            bottom: 0;
            pointer-events: auto;
        }
        .touch-left { left: 0; }
        .touch-right { right: 0; }

    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>

    <div class="ui-layer">
        <div class="hud">
            <div id="scoreDisplay">PUNTOS: 0</div>
            <div id="levelDisplay">NIVEL: 1</div>
        </div>
        <div id="questionBox" class="question-box">
            ¿Pregunta aquí?
        </div>
    </div>

    <!-- Start Screen -->
    <div id="startScreen" class="screen">
        <h1>RUNNER DEL TALLER</h1>
        <p>¡Repasa las normas de seguridad de 2º ESO!<br>Muévete para elegir la puerta con la respuesta CORRECTA.</p>
        <button id="startBtn">JUGAR</button>
        <div class="controls-hint">Usa las FLECHAS o TOCA los lados de la pantalla</div>
    </div>

    <!-- Game Over Screen -->
    <div id="gameOverScreen" class="screen hidden">
        <h1 style="color: #e74c3c;">¡ACCIDENTE!</h1>
        <p id="deathReason">Has incumplido una norma de seguridad.</p>
        <p>Puntuación Final: <span id="finalScore">0</span></p>
        <button id="restartBtn">REINTENTAR</button>
    </div>

    <!-- Mobile Controls Zones -->
    <div id="mobile-controls">
        <div class="touch-zone touch-left" id="btnLeft"></div>
        <div class="touch-zone touch-right" id="btnRight"></div>
    </div>
</div>

<script>
    /**
     * DATABASE OF QUESTIONS (NORMAS DE AULA TALLER)
     */
    const questionsDB = [
        {
            q: "Al entrar en el taller, ¿qué haces con la mochila?",
            correct: "Dejarla en la estantería",
            wrong: "Dejarla en el pasillo",
            feedback: "¡Cuidado! Las mochilas en el suelo provocan tropiezos. Siempre a su estantería."
        },
        {

            wrong: "Suelto",
            feedback: "El pelo suelto puede engancharse en las máquinas (taladro, lijadora). ¡Peligroso!"
        },
        {
            q: "¿Qué usas para proteger tus ojos al taladrar?",

        },
        {
            q: "Si se te rompe una herramienta...",
            correct: "Aviso al profesor/a",
            wrong: "La escondo rápido",
            feedback: "Si escondes una herramienta rota, el siguiente compañero puede hacerse daño."
        },
        {
            q: "¿Puedes comer o beber en el taller?",
            correct: "No, nunca",
            wrong: "Solo si tengo hambre",
            feedback: "El taller no es una cafetería. Hay polvo, serrín y productos químicos."
        },
        {
            q: "Al terminar la clase, la mesa debe quedar...",
            correct: "Limpia y ordenada",
            wrong: "Como esté",
            feedback: "El orden es seguridad. Cada herramienta a su panel y la mesa limpia."
        },
        {
            q: "¿Qué haces si no sabes usar una máquina?",
            correct: "Preguntar antes",
            wrong: "Probar suerte",
            feedback: "Nunca uses una máquina sin saber cómo funciona. ¡Pregunta siempre!"
        },
        {
            q: "¿Se puede correr por el taller?",
            correct: "No, andamos tranquilos",
            wrong: "Si tengo prisa sí",
            feedback: "Correr en un taller lleno de herramientas es garantía de accidente."
        },
        {
            q: "La ropa para trabajar debe ser...",

            wrong: "Muy holgada / Bufandas",
            feedback: "La ropa muy ancha, bufandas o collares pueden engancharse en las máquinas."
        },
        {

            correct: "Con cepillo y recogedor",
            wrong: "Soplando fuerte",
            feedback: "Si soplas, la viruta puede entrarte en los ojos. Usa el cepillo."
        },
        // --- NUEVAS PREGUNTAS AÑADIDAS ---
        {
            q: "¿Cómo debes desenchufar una máquina?",
            correct: "Tirando de la clavija",
            wrong: "Tirando del cable",
            feedback: "Si tiras del cable, puedes romper los hilos internos y provocar un cortocircuito."
        },
        {
            q: "Si tienes las manos mojadas...",
            correct: "Me seco antes de tocar nada",
            wrong: "No pasa nada",
            feedback: "El agua conduce la electricidad. ¡Nunca toques enchufes o interruptores con manos mojadas!"
        },
        {
            q: "¿Cómo se le pasa una tijera a un compañero?",
            correct: "Ofreciendo el mango",
            wrong: "Con la punta hacia él",
            feedback: "Pasa siempre las herramientas de corte por el mango para evitar pinchazos accidentales."
        },
        {
            q: "¿Puedes llevar herramientas en los bolsillos?",
            correct: "No, es peligroso",
            wrong: "Sí, es más cómodo",
            feedback: "Si te caes o te apoyas, la herramienta puede clavarse. Usa las manos o una caja."
        },
        {
            q: "Al usar la pistola de pegamento, NO toques...",
            correct: "La boquilla metálica",
            wrong: "El gatillo",
            feedback: "La boquilla alcanza altas temperaturas y produce quemaduras graves."
        },
        {
            q: "¿Dónde se deja el soldador caliente si no se usa?",
            correct: "En su soporte",
            wrong: "Encima de la mesa",
            feedback: "La punta del soldador quema la mesa y puede causar incendios. Usa siempre el soporte."
        },
        {
            q: "Para cortar madera, la pieza debe estar...",
            correct: "Sujeta al tornillo de banco",
            wrong: "Sujeta con la mano fuerte",
            feedback: "Si se escapa la sierra, te cortarás la mano. Sujeta siempre la pieza al banco firmemente."
        },
        {
            q: "¿Puedes distraer a un compañero que usa una máquina?",
            correct: "No, nunca",
            wrong: "Sí, para una broma",
            feedback: "Distraer a alguien que usa herramientas peligrosas puede causar un accidente grave."
        },
        {
            q: "¿Para qué sirve un destornillador?",
            correct: "Apretar/aflojar tornillos",
            wrong: "Hacer palanca o agujeros",
            feedback: "Usar herramientas para lo que no son estropea la herramienta y es inseguro."
        },
        {
            q: "Si suena la alarma de emergencia...",
            correct: "Salgo ordenadamente",
            wrong: "Recojo mis cosas primero",
            feedback: "En una emergencia, lo primero es tu vida. Deja todo y sal al punto de encuentro."
        },
        {
            q: "¿Qué haces si ves un cable pelado?",
            correct: "Aviso al profe ya",
            wrong: "Le pongo cinta aislante",
            feedback: "No manipules instalaciones eléctricas rotas. Avisa al profesor inmediatamente."
        },
        {
            q: "Al limar o lijar, ¿cómo te colocas?",
            correct: "Pie adelantado y estable",
            wrong: "Sentado en el taburete",
            feedback: "Para limar bien y seguro, necesitas una postura de pie estable para hacer fuerza correctamente."
        }
    ];

    /**
     * GAME ENGINE
     */
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // UI Elements
    const startScreen = document.getElementById('startScreen');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const levelDisplay = document.getElementById('levelDisplay');
    const questionBox = document.getElementById('questionBox');
    const deathReason = document.getElementById('deathReason');
    const finalScore = document.getElementById('finalScore');

    // Game State
    let gameState = 'START'; // START, PLAYING, GAMEOVER
    let score = 0;
    let speed = 0;
    let level = 1;
    let frames = 0;
    let lastTime = 0;

    // Entities
    let player;
    let doors = [];
    let particles = [];
    
    // Current Logic
    let currentQuestion = null;
    let questionActive = false;
    let nextSpawnY = -500; // Distance for next door

    // Audio Context (Synthesized sounds)
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx = new AudioContext();

    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        if (type === 'jump') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        } else if (type === 'score') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.setValueAtTime(800, audioCtx.currentTime + 0.1);
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        } else if (type === 'crash') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.4);
            gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.4);
        }
    }

    /**
     * RESIZING
     */
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    /**
     * CLASSES
     */
    class Player {
        constructor() {
            this.width = 40;
            this.height = 40;
            this.x = canvas.width / 2 - this.width / 2;
            this.y = canvas.height - 150;
            this.velX = 0;
            this.speed = 8;
            this.color = '#3498db';
        }

        update() {
            // Smooth movement
            if (keys.ArrowLeft || keys.a) this.velX = -this.speed;
            else if (keys.ArrowRight || keys.d) this.velX = this.speed;
            else this.velX = 0;

            this.x += this.velX;

            // Boundaries
            if (this.x < 0) this.x = 0;
            if (this.x + this.width > canvas.width) this.x = canvas.width - this.width;
        }

        draw() {
            // Body
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y, this.width, this.height);
            
            // Eyes (Robot look)
            ctx.fillStyle = 'white';
            ctx.fillRect(this.x + 5, this.y + 8, 10, 10);
            ctx.fillRect(this.x + 25, this.y + 8, 10, 10);
            ctx.fillStyle = 'black';
            ctx.fillRect(this.x + 8, this.y + 11, 4, 4);
            ctx.fillRect(this.x + 28, this.y + 11, 4, 4);

            // Wheels
            ctx.fillStyle = '#555';
            ctx.fillRect(this.x - 5, this.y + 30, 10, 10);
            ctx.fillRect(this.x + this.width - 5, this.y + 30, 10, 10);
        }
    }

    class DoorPair {
        constructor(y, questionObj) {
            this.y = y;
            this.height = 20; // Thin threshold to cross
            this.visualHeight = 150; // Visual box size
            this.question = questionObj;
            this.passed = false;
            
            // Randomize which side is correct (0 = left, 1 = right)
            this.correctSide = Math.random() < 0.5 ? 0 : 1;
            
            this.gap = 20;
            this.doorWidth = (canvas.width / 2) - 10;
        }

        update(scrollSpeed) {
            this.y += scrollSpeed;
        }

        draw() {
            const leftX = 5;
            const rightX = canvas.width / 2 + 5;
            const w = (canvas.width / 2) - 10;
            
            // Draw Doorframes/Backgrounds
            // Left Door
            ctx.fillStyle = '#e67e22'; // Wood color
            ctx.fillRect(leftX, this.y - this.visualHeight, w, this.visualHeight);
            
            // Right Door
            ctx.fillStyle = '#e67e22';
            ctx.fillRect(rightX, this.y - this.visualHeight, w, this.visualHeight);

            // Door outlines
            ctx.strokeStyle = '#d35400';
            ctx.lineWidth = 4;
            ctx.strokeRect(leftX, this.y - this.visualHeight, w, this.visualHeight);
            ctx.strokeRect(rightX, this.y - this.visualHeight, w, this.visualHeight);

            // Text Setup
            ctx.fillStyle = 'white';
            ctx.font = 'bold 16px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            // Wrap text logic
            const drawWrappedText = (text, x, y, maxWidth) => {
                const words = text.split(' ');
                let line = '';
                let lineHeight = 20;
                let lineCount = 0;
                let lines = [];

                for(let n = 0; n < words.length; n++) {
                    let testLine = line + words[n] + ' ';
                    let metrics = ctx.measureText(testLine);
                    let testWidth = metrics.width;
                    if (testWidth > maxWidth && n > 0) {
                        lines.push(line);
                        line = words[n] + ' ';
                    } else {
                        line = testLine;
                    }
                }
                lines.push(line);

                let startY = y - ((lines.length - 1) * lineHeight) / 2;
                for(let i = 0; i < lines.length; i++) {
                    ctx.fillText(lines[i], x, startY + (i * lineHeight));
                }
            };

            // Left Answer Text
            let leftText = this.correctSide === 0 ? this.question.correct : this.question.wrong;
            drawWrappedText(leftText, leftX + w/2, this.y - this.visualHeight/2, w - 20);

            // Right Answer Text
            let rightText = this.correctSide === 1 ? this.question.correct : this.question.wrong;
            drawWrappedText(rightText, rightX + w/2, this.y - this.visualHeight/2, w - 20);
        }
    }

    class Particle {
        constructor(x, y, color) {
            this.x = x;
            this.y = y;
            this.size = Math.random() * 5 + 2;
            this.speedX = Math.random() * 6 - 3;
            this.speedY = Math.random() * 6 - 3;
            this.color = color;
            this.life = 1;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            this.life -= 0.02;
        }
        draw() {
            ctx.fillStyle = this.color;
            ctx.globalAlpha = this.life;
            ctx.fillRect(this.x, this.y, this.size, this.size);
            ctx.globalAlpha = 1;
        }
    }

    /**
     * INPUT HANDLING
     */
    const keys = {};
    window.addEventListener('keydown', e => keys[e.key] = true);
    window.addEventListener('keyup', e => keys[e.key] = false);

    // Touch controls
    const btnLeft = document.getElementById('btnLeft');
    const btnRight = document.getElementById('btnRight');
    
    btnLeft.addEventListener('touchstart', (e) => { e.preventDefault(); keys.ArrowLeft = true; });
    btnLeft.addEventListener('touchend', (e) => { e.preventDefault(); keys.ArrowLeft = false; });
    btnRight.addEventListener('touchstart', (e) => { e.preventDefault(); keys.ArrowRight = true; });
    btnRight.addEventListener('touchend', (e) => { e.preventDefault(); keys.ArrowRight = false; });

    /**
     * GAME FUNCTIONS
     */

    function initGame() {
        player = new Player();
        doors = [];
        particles = [];
        score = 0;
        speed = 2;
        level = 1;
        scoreDisplay.innerText = "PUNTOS: 0";
        levelDisplay.innerText = "NIVEL: 1";
        gameState = 'PLAYING';
        
        startScreen.classList.add('hidden');
        gameOverScreen.classList.add('hidden');
        
        // Spawn first door
        spawnDoor(-200);
        
        // Background loop
        loop();
    }

    function spawnDoor(yOverride) {
        // Pick random question
        const qIndex = Math.floor(Math.random() * questionsDB.length);
        const q = questionsDB[qIndex];
        
        // If yOverride is not provided, place it well above screen
        const y = yOverride !== undefined ? yOverride : -300;
        
        doors.push(new DoorPair(y, q));
        
        // Show question immediately if it's the first active door
        if (!questionActive) {
            showQuestion(q.q);
        }
    }

    function showQuestion(text) {
        questionBox.innerText = text;
        questionBox.classList.add('active');
        questionActive = true;
    }

    function createExplosion(x, y, color) {
        for(let i=0; i<20; i++) {
            particles.push(new Particle(x, y, color));
        }
    }

    function gameOver(reason) {
        gameState = 'GAMEOVER';
        questionBox.classList.remove('active');
        playSound('crash');
        
        deathReason.innerText = reason;
        finalScore.innerText = score;
        
        gameOverScreen.classList.remove('hidden');
    }

    function update() {
        if (gameState !== 'PLAYING') return;

        player.update();

        // Manage Doors
        if (doors.length === 0 || doors[doors.length-1].y > canvas.height / 2) {
             // Spawn distance logic
             if (doors.length === 0 || (canvas.height - doors[doors.length-1].y) > 600) {
                 spawnDoor(-100);
             }
        }

        for (let i = doors.length - 1; i >= 0; i--) {
            let d = doors[i];
            d.update(speed);

            // Update UI question based on the closest approaching door
            if (d.y > 0 && d.y < canvas.height && questionBox.innerText !== d.question.q) {
                 showQuestion(d.question.q);
            }

            // Collision Detection
            // Check if player center passes the threshold Y
            // Threshold is d.y (bottom of door visual)
            
            // Logic: Is player crossing the line?
            // We use a small range to prevent skipping in high speeds
            if (d.y >= player.y && d.y <= player.y + player.height + speed + 5 && !d.passed) {
                
                // Determine player side
                const pCenterX = player.x + player.width/2;
                const midScreen = canvas.width / 2;
                
                let playerSide = -1; // 0 left, 1 right
                if (pCenterX < midScreen) playerSide = 0;
                else playerSide = 1;

                if (playerSide === d.correctSide) {
                    // CORRECT
                    d.passed = true;
                    score += 100;
                    scoreDisplay.innerText = "PUNTOS: " + score;
                    playSound('score');
                    createExplosion(player.x + player.width/2, player.y, '#2ecc71');
                    
                    // Increase speed slightly every 3 correct answers
                    if (score % 300 === 0) {
                        speed += 0.2;
                        level++;
                        levelDisplay.innerText = "NIVEL: " + level;
                        createExplosion(canvas.width/2, canvas.height/2, '#f1c40f');
                    }

                } else {
                    // WRONG
                    gameOver(d.question.feedback);
                    return;
                }
            }

            // Remove off-screen doors
            if (d.y > canvas.height + 200) {
                doors.splice(i, 1);
            }
        }

        // Particles
        for (let i = particles.length - 1; i >= 0; i--) {
            particles[i].update();
            if (particles[i].life <= 0) particles.splice(i, 1);
        }
    }

    function draw() {
        // Clear background
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Perspective Floor (Grid effect)
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
        ctx.lineWidth = 1;
        
        // Vertical lines
        for(let x = 0; x <= canvas.width; x+= canvas.width/4) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, canvas.height);
            ctx.stroke();
        }
        
        // Moving horizontal lines
        const offset = (Date.now() / (10/speed) * -1) % 100;
        for(let y = 0; y <= canvas.height; y+= 100) {
            let drawY = y + offset;
            if(drawY > canvas.height) drawY -= canvas.height; // Wrap
            
            ctx.beginPath();
            ctx.moveTo(0, drawY);
            ctx.lineTo(canvas.width, drawY);
            ctx.stroke();
        }

        // Draw Doors (Behind player usually, but Z-order depends on Y technically, simplified here)
        doors.forEach(d => d.draw());

        // Draw Player
        player.draw();

        // Draw Particles
        particles.forEach(p => p.draw());
    }

    function loop() {
        if (gameState === 'PLAYING') {
            update();
            draw();
            requestAnimationFrame(loop);
        }
    }

    /**
     * BUTTON LISTENERS
     */
    document.getElementById('startBtn').addEventListener('click', initGame);
    document.getElementById('restartBtn').addEventListener('click', initGame);

</script>

</body>
</html>
